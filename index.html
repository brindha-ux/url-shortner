<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkX Ultra</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    cursor: none;
}

body {
    background: #000;
    color: white;
    font-family: 'Poppins', sans-serif;
    overflow-x: hidden;
}

/* PARTICLES */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* CURSOR GLOW */
.cursor {
    position: fixed;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #ff2e63;
    pointer-events: none;
    box-shadow: 0 0 20px #ff2e63;
    transform: translate(-50%, -50%);
    z-index: 999;
}

/* NAV */
nav {
    display: flex;
    justify-content: space-between;
    padding: 20px 60px;
}

.logo {
    font-family: 'Orbitron';
    color: #ff2e63;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */
.card {
    width: 420px;
    padding: 40px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    box-shadow: 0 0 40px rgba(255,0,100,0.3);
    text-align: center;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin: 15px 0;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.1);
    color: white;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(45deg,#ff2e63,#ff6a00);
    color: white;
    font-weight: bold;
    transition: 0.2s;
}

/* MAGNETIC EFFECT */
button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #ff2e63;
}

/* RESULT */
.result {
    margin-top: 20px;
    display: none;
}

.result a {
    color: #00ffcc;
}

/* SUGGESTIONS */
.suggestions {
    font-size: 12px;
    color: #aaa;
    margin-top: 5px;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>
<div class="cursor" id="cursor"></div>

<nav>
    <div class="logo">LinkX Ultra</div>
</nav>

<section class="hero">
    <div class="card">
        <h2>🚀 Smart URL Shortener</h2>

        <input type="text" id="urlInput" placeholder="Paste URL...">
        <div class="suggestions" id="suggestions"></div>

        <button id="shortBtn">Generate Link</button>

        <div class="result" id="result">
            <p>Short Link:</p>
            <a id="shortLink" href="#" target="_blank"></a>
        </div>
    </div>
</section>

<script>
/* PARTICLES BACKGROUND */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
for(let i=0;i<80;i++){
    particles.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        r: Math.random()*2,
        dx: Math.random()*0.5,
        dy: Math.random()*0.5
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="#ff2e63";
    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fill();

        p.x+=p.dx;
        p.y+=p.dy;

        if(p.x>canvas.width) p.x=0;
        if(p.y>canvas.height) p.y=0;
    });
    requestAnimationFrame(animate);
}
animate();

/* CURSOR */
const cursor = document.getElementById("cursor");
document.addEventListener("mousemove", e=>{
    cursor.style.left = e.clientX + "px";
    cursor.style.top = e.clientY + "px";
});

/* SMART SUGGESTIONS */
const input = document.getElementById("urlInput");
const suggest = document.getElementById("suggestions");

input.addEventListener("input", ()=>{
    if(input.value.includes("youtube")){
        suggest.innerText="💡 Tip: Short YouTube links for sharing videos!";
    } else if(input.value.includes("instagram")){
        suggest.innerText="💡 Tip: Perfect for bio links!";
    } else {
        suggest.innerText="";
    }
});

/* SHORTENER (FIXED) */
document.getElementById("shortBtn").addEventListener("click", async ()=>{
    const url = input.value.trim();
    const resultDiv = document.getElementById("result");
    const shortLink = document.getElementById("shortLink");

    if(!url){
        alert("Enter URL");
        return;
    }

    try {
        const res = await fetch("https://api.shrtco.de/v2/shorten?url=" + encodeURIComponent(url));
        const data = await res.json();

        if(data.ok){
            const link = data.result.full_short_link;
            shortLink.href = link;
            shortLink.innerText = link;
            resultDiv.style.display = "block";
        } else {
            alert("Invalid URL");
        }
    } catch(e){
        alert("API error");
    }
});
</script>

</body>
</html>
