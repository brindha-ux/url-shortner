<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkX - URL Shortener</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #0f0f0f;
    color: white;
}

/* Navbar */
nav {
    display: flex;
    justify-content: space-between;
    padding: 20px 50px;
    background: #111;
}

.logo {
    font-size: 24px;
    font-weight: 600;
    color: #ff3c3c;
}

nav ul {
    display: flex;
    list-style: none;
    gap: 20px;
}

nav a {
    text-decoration: none;
    color: white;
    transition: 0.3s;
}

nav a:hover {
    color: #ff3c3c;
}

/* Hero */
.hero {
    text-align: center;
    padding: 80px 20px;
}

.hero h1 {
    font-size: 40px;
    margin-bottom: 10px;
}

.hero p {
    color: #aaa;
    margin-bottom: 30px;
}

/* Input Box */
.input-box {
    display: flex;
    justify-content: center;
    gap: 10px;
}

input {
    padding: 12px;
    width: 300px;
    border-radius: 8px;
    border: none;
    outline: none;
}

button {
    padding: 12px 20px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(45deg, #ff3c3c, #ff6a6a);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* Result */
.result {
    margin-top: 30px;
    display: none;
}

.result-box {
    background: #1a1a1a;
    padding: 15px;
    border-radius: 10px;
    display: inline-flex;
    gap: 10px;
    align-items: center;
}

/* Features */
.features {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 50px 20px;
    flex-wrap: wrap;
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 15px;
    width: 250px;
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px);
}

/* Footer */
footer {
    text-align: center;
    padding: 20px;
    background: #111;
    margin-top: 50px;
    color: #aaa;
}
</style>
</head>

<body>

<!-- Navbar -->
<nav>
    <div class="logo">LinkX</div>
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Features</a></li>
        <li><a href="#">Login</a></li>
    </ul>
</nav>

<!-- Hero -->
<section class="hero">
    <h1>Shorten Your Links Instantly</h1>
    <p>Fast, simple, and secure URL shortening</p>

    <div class="input-box">
        <input type="text" id="urlInput" placeholder="Enter your URL here">
        <button onclick="shortenURL()">Shorten</button>
    </div>

    <div class="result" id="result">
        <div class="result-box">
            <span id="shortLink"></span>
            <button onclick="copyLink()">Copy</button>
        </div>
    </div>
</section>

<!-- Features -->
<section class="features">
    <div class="card">
        <h3>⚡ Fast</h3>
        <p>Instant link shortening</p>
    </div>
    <div class="card">
        <h3>🔒 Secure</h3>
        <p>Safe and reliable links</p>
    </div>
    <div class="card">
        <h3>📊 Analytics</h3>
        <p>Track your clicks</p>
    </div>
</section>

<!-- Footer -->
<footer>
    <p>© 2026 LinkX | Built by You 🚀</p>
</footer>

<script>
async function shortenURL() {
    const input = document.getElementById("urlInput").value;
    const resultDiv = document.getElementById("result");
    const shortLink = document.getElementById("shortLink");

    if (!input) {
        alert("Please enter a URL");
        return;
    }

    try {
        const res = await fetch(`https://api.shrtco.de/v2/shorten?url=${input}`);
        const data = await res.json();

        if (data.ok) {
            shortLink.innerText = data.result.full_short_link;
            resultDiv.style.display = "block";
        } else {
            alert("Invalid URL");
        }
    } catch (error) {
        alert("Something went wrong!");
    }
}

function copyLink() {
    const text = document.getElementById("shortLink").innerText;
    navigator.clipboard.writeText(text);
    alert("Copied!");
}
</script>

</body>
</html>
